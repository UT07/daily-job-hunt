[build]
  base = "web"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy API calls to your FastAPI backend (Lambda or local)
# Update VITE_API_URL in Netlify env vars to point to your API Gateway URL
[[redirects]]
  from = "/api/*"
  to = ":VITE_API_URL/api/:splat"
  status = 200
  force = true
