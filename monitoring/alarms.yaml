# monitoring/alarms.yaml
# Canonical CloudWatch alarm definitions for Phase 2 critical-tier Lambda canaries.
# Inlined into template.yaml's Resources block (see plan Task 3 / Task 6). Authored
# here so future edits have one source of truth; copy-paste into template.yaml on
# any change.
#
# Roadmap: docs/superpowers/plans/2026-04-27-deployment-safety-roadmap.md
# Tier:    Critical (Canary10Percent5Minutes), 5 functions x 3 alarms each.

  WsRouteFunctionErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: naukribaba-ws-route-Errors
      AlarmDescription: Trips canary if any errors during traffic shift
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: naukribaba-ws-route
        - Name: Resource
          Value: naukribaba-ws-route:live
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  WsRouteFunctionThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: naukribaba-ws-route-Throttles
      AlarmDescription: Trips canary on any concurrency throttling during shift
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: naukribaba-ws-route
        - Name: Resource
          Value: naukribaba-ws-route:live
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  WsRouteFunctionDurationP99Alarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: naukribaba-ws-route-DurationP99
      AlarmDescription: Trips canary if p99 duration exceeds 30s over 5min - catches death spiral
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: naukribaba-ws-route
        - Name: Resource
          Value: naukribaba-ws-route:live
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 1
      Threshold: 30000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

