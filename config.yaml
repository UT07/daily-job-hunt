      - "Software Developer"
      - "Web Developer"

# --- Job Search Parameters ---
search:
  # Keywords to search for (one search per keyword group)
  queries:
    # SRE / DevOps / Platform
    - "Site Reliability Engineer"
    - "DevOps Engineer"
    - "Platform Engineer"
    - "Cloud Engineer"
    - "Infrastructure Engineer"
    - "SRE"
    # Full-Stack / Backend
    - "Software Engineer"
    - "Full Stack Developer"
    - "Full Stack Engineer"
    - "Backend Engineer"
    - "Python Developer"
    - "Python Engineer"
    - "Node.js Developer"
    # Graduate / Junior level
    - "Junior Software Engineer"
    - "Graduate Software Engineer"
    - "Graduate DevOps Engineer"
    - "Junior DevOps Engineer"
    - "Entry Level Engineer"
    - "Associate Software Engineer"
    # Cloud specific
    - "AWS Engineer"
    - "Kubernetes Engineer"
    - "Cloud Infrastructure Engineer"
    - "Cloud Native Engineer"

  # Multi-geo search: Ireland (primary), India (remote only), US (remote + sponsorship)
  # LinkedIn scrapers are created per geo region.
  geo_regions:
    - name: "Ireland"
      geo_id: "104738515"     # LinkedIn geoId for Ireland
      priority: 1             # Highest priority (80% of results)
      remote_only: false
    - name: "India"
      geo_id: "102713980"     # LinkedIn geoId for India
      priority: 2             # Lower priority (15%)
      remote_only: true       # Only remote roles (residing in Ireland)
      min_salary: "1000000"   # ₹10 LPA minimum
    - name: "US (Remote)"
      geo_id: ""              # No geo filter — worldwide remote
      priority: 3             # Lowest priority (5%)
      remote_only: true       # Remote only (no US work authorization)
      sponsorship_note: "Requires visa sponsorship"

  # Location preferences for API scrapers (Adzuna, etc.)
  locations:
    primary:
      - "Dublin, Ireland"
      - "Ireland"
    secondary:
      - "Remote"

  # Experience level filters
  experience_levels:
    - "entry_level"
    - "mid_level"

  # How many days back to search for new postings
  days_back: 7

  # Maximum jobs to process per run (to manage API costs)
  max_jobs_per_run: 25

  # Minimum match score (0-100) to generate resume + cover letter
  min_match_score: 50

# --- API Keys ---
api_keys:
  # AI providers (need at least ONE — all free)
  groq: "${GROQ_API_KEY}"
  deepseek: "${DEEPSEEK_API_KEY}"
  openrouter: "${OPENROUTER_API_KEY}"
  anthropic: "${ANTHROPIC_API_KEY}"

  # Job scraper APIs
  adzuna_app_id: "${ADZUNA_APP_ID}"
  adzuna_app_key: "${ADZUNA_APP_KEY}"

# --- Scraper Settings ---
scrapers:
  enabled:
    # API-based (reliable, no bot detection):
    - "adzuna"       # Adzuna API (free: 250 req/mo, strong for Ireland/UK)
    # Irish job boards (lightweight HTML scrapers):
    - "irishjobs"    # IrishJobs.ie (requests-first, Playwright fallback)
    - "jobs_ie"      # Jobs.ie — major Irish job board
    - "gradireland"  # GradIreland — graduate roles in Ireland
    # LinkedIn (multi-geo via Playwright stealth):
    - "linkedin"     # LinkedIn — one instance per geo_region above
    # Startup-focused (API/HTML — lightweight):
    - "yc_wats"      # YC Work at a Startup (US startups, some remote)
    - "hn_hiring"    # Hacker News "Who is Hiring?" threads

  # Parallel scraping workers
  max_workers: 8

  # Max time (minutes) for the scraping phase
  max_scrape_minutes: 10

  # Request delays to be respectful
  delay_between_requests: 2

  # Browser scraper settings
  browser:
    headless: true
    max_pages: 1

# --- Output Settings ---
output:
  base_dir: "./output"
  tracker_filename: "job_tracker.xlsx"
  retention_days: 30

# --- Google Docs Template Engine (resume/cover letter generation) ---
google_docs:
  enabled: true
  credentials_path: "google_credentials.json"
  share_with: "254utkarsh@gmail.com"

# --- Google Drive Upload (shareable links in email) ---
google_drive:
  enabled: true
  credentials_path: "google_credentials.json"
  share_with: "254utkarsh@gmail.com"
  folder_id: ""  # Optional: Drive folder for generated PDFs

# --- AI Provider Settings ---
ai:
  groq_model: "llama-3.3-70b-versatile"
  deepseek_model: "deepseek-chat"
  openrouter_model: "meta-llama/llama-3.3-70b-instruct:free"
  cache:
    path: "output/.ai_cache.db"
    ttl_hours: 72
