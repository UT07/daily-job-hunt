  github: "https://github.com/UT07"
  linkedin: "https://www.linkedin.com/in/utkarshsingh2001/"
  website: "https://utworld.netlify.app"

# --- Resume Paths (LaTeX source files) ---
resumes:
  sre_devops:
    tex_path: "../DevOps:SRE/resume.tex"
    label: "SRE / DevOps Engineer"
    target_roles:
      - "Site Reliability Engineer"
      - "DevOps Engineer"
      - "Platform Engineer"
      - "Infrastructure Engineer"
      - "Cloud Engineer"
      - "SRE"
  fullstack:
    tex_path: "../FullStack/resume_servicenow.tex"
    label: "Full-Stack Software Engineer"
    target_roles:
      - "Software Engineer"
      - "Full Stack Developer"
      - "Full Stack Engineer"
      - "Backend Engineer"
      - "Python Developer"
      - "Software Developer"
      - "Web Developer"

# --- Job Search Parameters ---
search:
  # Keywords to search for (one search per keyword group)
  queries:
    # SRE / DevOps / Platform
    - "Site Reliability Engineer"
    - "DevOps Engineer"
    - "Platform Engineer"
    - "Cloud Engineer"
    - "Infrastructure Engineer"
    # Full-Stack / Backend
    - "Software Engineer"
    - "Full Stack Developer"
    - "Full Stack Engineer"
    - "Backend Engineer"
    - "Python Developer"
    - "Node.js Developer"
    - "React Developer"
    - "TypeScript Developer"
    - "Web Developer"
    # Graduate / Junior level
    - "Junior Software Engineer"
    - "Graduate Software Engineer"
    - "Graduate DevOps Engineer"
    - "Junior DevOps Engineer"

  # Location preferences (priority order)
  locations:
    primary:
      - "Dublin, Ireland"
      - "Ireland"
    secondary:
      - "Remote"
      - "Remote - Worldwide"

  # Experience level filters
  experience_levels:
    - "entry_level"      # Fresh grad roles
    - "mid_level"        # Mid-level (you have an edge here)

  # How many days back to search for new postings
  days_back: 3  # Fetch jobs posted in the last 3 days for better coverage

  # Maximum jobs to process per run (to manage API costs)
  max_jobs_per_run: 30

  # Minimum match score (0-100) to generate resume + cover letter
  min_match_score: 60

# --- API Keys ---
# Set these as environment variables (or replace the ${...} placeholders)
api_keys:
  # AI providers (need at least ONE — all free)
  groq: "${GROQ_API_KEY}"               # https://console.groq.com/keys (free: 30 RPM, 14,400 RPD)
  deepseek: "${DEEPSEEK_API_KEY}"       # https://platform.deepseek.com/ (free: 60 RPM)
  openrouter: "${OPENROUTER_API_KEY}"    # https://openrouter.ai/keys (free models: Qwen, Llama)
  anthropic: "${ANTHROPIC_API_KEY}"      # https://console.anthropic.com/ (paid, optional fallback)

  # Job scraper APIs (at least ONE recommended; browser scrapers work without keys)
  serpapi: "${SERPAPI_API_KEY}"           # https://serpapi.com/ (~$50/mo, best coverage)
  jsearch: "${JSEARCH_API_KEY}"          # https://rapidapi.com/.../jsearch (free: 200 req/mo)
  adzuna_app_id: "${ADZUNA_APP_ID}"      # https://developer.adzuna.com/ (free: 250 req/mo)
  adzuna_app_key: "${ADZUNA_APP_KEY}"

# --- Scraper Settings ---
scrapers:
  # Enable/disable individual scrapers
  # API-based (reliable, never blocked):
  enabled:
    - "serpapi"      # Google Jobs via SerpAPI — indexes LinkedIn + Indeed + all boards (~$50/mo)
    - "jsearch"      # JSearch via RapidAPI (free tier: 200 req/mo)
    - "adzuna"       # Adzuna API (free tier: 250 req/mo, great for Ireland)
    # Browser-based (Playwright stealth — can occasionally get blocked):
    - "linkedin"     # LinkedIn public job search via Playwright
    - "indeed"       # Indeed via Playwright (Cloudflare protected)
    - "irishjobs"    # IrishJobs.ie via Playwright
    # Startup-focused (API/HTML — lightweight, no Cloudflare):
    - "yc_wats"      # YC Work at a Startup
    - "hn_hiring"    # Hacker News "Who is Hiring?" threads

  # Parallel scraping workers (ThreadPoolExecutor)
  max_workers: 8

  # Request delays to be respectful
  delay_between_requests: 2  # seconds

  # Browser scraper settings
  browser:
    headless: true       # Run in headless mode (set false for debugging)
    max_pages: 2         # Pages to scrape per query (more = slower + riskier)
    indeed_country: "ie" # ie, co.uk, com
    linkedin_geo_id: "104738515"  # Ireland=104738515, UK=101165590

# --- Output Settings ---
output:
  # Base directory for daily output (relative to this config)
  base_dir: "./output"

  # Excel tracker filename
  tracker_filename: "job_tracker.xlsx"

  # Keep artifacts for this many days
  retention_days: 30

# --- AI Provider Settings ---
# Priority order: Groq → OpenRouter → Anthropic (failover chain)
ai:
  # Groq (primary — free, fastest inference)
  groq_model: "llama-3.3-70b-versatile"

  # DeepSeek (secondary — free, strong on structured output)
  deepseek_model: "deepseek-chat"

  # OpenRouter (tertiary — free models aggregator)
  openrouter_model: "qwen/qwen-2.5-72b-instruct:free"

  # Anthropic (paid fallback only — uncomment if you want it)
  # anthropic_model: "claude-sonnet-4-20250514"

  # Response cache (avoids re-processing identical prompts)
  cache:
    path: "output/.ai_cache.db"
    ttl_hours: 72   # Cache responses for 3 days
