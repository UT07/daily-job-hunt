name: Deploy Backend

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to ECR
        run: aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin 385017713886.dkr.ecr.eu-west-1.amazonaws.com

      # NOTE: test.yml runs the full test suite on PRs. This gate re-runs unit
      # and contract tests here to block deploy on main if tests are broken.
      - name: Run unit tests before deploy
        run: |
          pip install -r requirements.txt -r tests/requirements-test.txt
          pytest tests/unit/ tests/contract/ -v --tb=short -x
        env:
          AWS_DEFAULT_REGION: eu-west-1

      - name: Build shared-deps layer
        # Layer is gitignored (layer/python/) and must be built before sam build,
        # otherwise sam zips only build.sh + requirements.txt (~500 bytes) and
        # every Lambda that depends on supabase/apify/etc fails with ModuleNotFoundError.
        # build.sh uses Docker (linux/amd64) to cross-compile for Lambda runtime.
        run: ./layer/build.sh

      - name: Build tectonic layer
        # layer-tectonic/bin/ is gitignored — this download must run before
        # sam build, otherwise SAM zips only build.sh (~400 bytes) and
        # compile_latex falls back to "tectonic_not_available" silently.
        # Symptom: pipeline runs succeed, jobs land with score but no PDF.
        run: ./layer-tectonic/build.sh

      - name: SAM Build
        env:
          DOCKER_BUILDKIT: "0"
          SAM_CLI_TELEMETRY: "0"
        run: sam build

      - name: SAM Deploy
        env:
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
          OR_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          QWEN_KEY: ${{ secrets.QWEN_API_KEY }}
          NVIDIA_KEY: ${{ secrets.NVIDIA_API_KEY }}
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SB_JWT: ${{ secrets.SUPABASE_JWT_SECRET }}
          SERPER_KEY: ${{ secrets.SERPER_API_KEY }}
          APIFY_KEY: ${{ secrets.APIFY_API_KEY }}
          CAPSOLVER_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
          BROWSER_SUBNETS: ${{ secrets.BROWSER_SUBNET_IDS }}
          DAILY_USER_ID: ${{ secrets.DAILY_PIPELINE_USER_ID }}
        run: |
          if [ -z "${DAILY_USER_ID}" ]; then
            echo "::error::DAILY_PIPELINE_USER_ID secret is not set. Set it to the real Supabase user UUID under which the daily pipeline should run." >&2
            exit 1
          fi
          sam deploy \
            --stack-name job-hunt-api \
            --region eu-west-1 \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --image-repository 385017713886.dkr.ecr.eu-west-1.amazonaws.com/job-hunt-api \
            --s3-bucket utkarsh-job-hunt \
            --s3-prefix sam-artifacts \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --no-disable-rollback \
            --parameter-overrides \
              "GroqApiKey=${GROQ_KEY}" \
              "OpenRouterApiKey=${OR_KEY}" \
              "QwenApiKey=${QWEN_KEY}" \
              "NvidiaApiKey=${NVIDIA_KEY}" \
              "GoogleCredentialsJson=PLACEHOLDER_SET_MANUALLY" \
              "SupabaseUrl=${SB_URL}" \
              "SupabaseServiceKey=${SB_KEY}" \
              "SupabaseJwtSecret=${SB_JWT}" \
              "SerperApiKey=${SERPER_KEY}" \
              "ApifyApiKey=${APIFY_KEY}" \
              "CapSolverApiKey=${CAPSOLVER_KEY}" \
              "BrowserSubnetIds=${BROWSER_SUBNETS}" \
              "DailyPipelineUserId=${DAILY_USER_ID}"
