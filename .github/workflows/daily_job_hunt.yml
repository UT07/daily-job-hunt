name: Daily Job Hunt

on:
  # Runs weekdays at 8:00 AM IST (Irish Standard Time)
  # 7:00 UTC = 8:00 IST (summer) / 7:00 GMT (winter)
  schedule:
    - cron: "0 7 * * 1-5"

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - dry-run
          - scrape-only

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Cache Playwright browsers (~300MB) — biggest time saver
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps (cached browsers still need this)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      # Cache apt packages for LaTeX (~200MB) — avoids slow download each run
      - name: Cache apt packages
        id: apt-cache
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-texlive-${{ runner.os }}-texlive-latex-base-extra-fonts-lmodern

      - name: Install LaTeX (for PDF compilation)
        run: |
          if [ -d ~/apt-cache ] && [ "$(ls -A ~/apt-cache 2>/dev/null)" ]; then
            echo "Restoring cached .deb packages..."
            sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-latex-base texlive-latex-extra texlive-fonts-recommended texlive-latex-recommended lmodern
          mkdir -p ~/apt-cache
          cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

      - name: Run job hunt pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          # S3 storage for PDFs and tracker
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          case "$MODE" in
            dry-run)     python main.py --dry-run ;;
            scrape-only) python main.py --scrape-only ;;
            *)           python main.py ;;
          esac

      - name: Upload daily artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-hunt-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            output/
          retention-days: 30

      - name: Commit updated tracker
        if: success()
        run: |
          git config user.name "Job Hunt Bot"
          git config user.email "bot@users.noreply.github.com"
          git add output/job_tracker.xlsx output/seen_jobs.json || true
          git diff --staged --quiet || git commit -m "Daily job hunt: $(date +%Y-%m-%d)"
          git push || echo "Push failed — will retry next run"

      # Email is handled by the pipeline itself (Step 10)
      # Set GMAIL_ADDRESS + GMAIL_APP_PASSWORD secrets to enable
