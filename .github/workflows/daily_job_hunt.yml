name: Daily Job Hunt

on:
  # Runs weekdays at 8:00 AM IST (Irish Standard Time = UTC+0 in winter, UTC+1 in summer)
  # Using 7:00 UTC to cover ~8am Irish time during summer (IST/GMT+1)
  # Adjust if needed: "0 8 * * 1-5" for winter (GMT)
  schedule:
    - cron: "0 7 * * 1-5"   # 7:00 UTC = 8:00 IST (summer) / 7:00 GMT (winter)

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - dry-run
          - scrape-only

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Install LaTeX (for PDF compilation)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-latex-base texlive-latex-extra texlive-fonts-recommended texlive-latex-recommended lmodern

      - name: Run job hunt pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          case "$MODE" in
            dry-run)     python main.py --dry-run ;;
            scrape-only) python main.py --scrape-only ;;
            *)           python main.py ;;
          esac

      - name: Upload daily artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-hunt-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            output/
          retention-days: 30

      # Commit updated tracker back to repo so it accumulates across runs
      - name: Commit updated tracker
        if: success()
        run: |
          git config user.name "Job Hunt Bot"
          git config user.email "bot@users.noreply.github.com"
          git add output/job_tracker.xlsx output/seen_jobs.json || true
          git diff --staged --quiet || git commit -m "Daily job hunt: $(date +%Y-%m-%d)"
          git push || echo "Push failed — will retry next run"

      - name: Send email summary (optional)
        if: success() && env.SENDGRID_API_KEY != ''
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          pip install sendgrid
          python -c "
          import json, os
          from pathlib import Path
          from datetime import date

          today = date.today().isoformat()
          meta_file = Path(f'output/{today}/run_metadata.json')
          if not meta_file.exists():
              print('No metadata found, skipping email')
              exit(0)

          meta = json.loads(meta_file.read_text())
          total = meta.get('raw_jobs', 0)
          matched = meta.get('matched_jobs', 0)
          top_jobs = meta.get('matched_details', [])[:5]

          body = f'Daily Job Hunt — {today}\n\n'
          body += f'Scraped: {total} | Matched: {matched}\n\n'
          body += 'Top matches:\n'
          for j in top_jobs:
              body += f\"  - {j['title']} @ {j['company']} (score: {j['score']}) — {j['apply_url']}\n\"

          import sendgrid
          from sendgrid.helpers.mail import Mail
          sg = sendgrid.SendGridAPIClient(os.environ['SENDGRID_API_KEY'])
          msg = Mail(
              from_email='jobhunt@bot.dev',
              to_emails=os.environ['NOTIFY_EMAIL'],
              subject=f'Job Hunt: {matched} matches found ({today})',
              plain_text_content=body,
          )
          sg.send(msg)
          print(f'Email sent to {os.environ[\"NOTIFY_EMAIL\"]}')
          "
