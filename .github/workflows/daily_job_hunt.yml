name: Daily Job Hunt

on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - dry-run
          - scrape-only

concurrency:
  group: daily-job-hunt
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Cache tectonic binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Tectonic
            ~/tectonic
          key: tectonic-${{ runner.os }}-v0.15

      - name: Install tectonic
        run: |
          if [ -f ~/tectonic/tectonic ]; then
            echo "Using cached tectonic binary"
          else
            mkdir -p ~/tectonic
            cd ~/tectonic
            curl -fsSL https://drop-sh.fullyjustified.net | sh
            cd -
          fi
          echo "$HOME/tectonic" >> "$GITHUB_PATH"
          ~/tectonic/tectonic --version

      - name: Setup Google Drive credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        if: env.GOOGLE_CREDENTIALS_JSON != ''
        run: |
          if echo "$GOOGLE_CREDENTIALS_JSON" | base64 -d > google_credentials.json 2>/dev/null; then
            echo "Decoded base64 credentials"
          else
            echo "$GOOGLE_CREDENTIALS_JSON" > google_credentials.json
            echo "Used raw JSON credentials"
          fi
          python3 -c "import json; json.load(open('google_credentials.json')); print('Credentials valid JSON')"

      - name: Run job hunt pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SKIP_CONTACTS: "true"
        run: |
          RUN_MODE="${{ github.event.inputs.mode }}"
          MODE="${RUN_MODE:-full}"
          case "$MODE" in
            dry-run)     python main.py --dry-run ;;
            scrape-only) python main.py --scrape-only ;;
            *)           python main.py ;;
          esac

      - name: Upload daily artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-hunt-${{ github.run_number }}-${{ github.run_attempt }}
          path: output/
          retention-days: 30

      - name: Commit seen_jobs tracker
        if: success()
        run: |
          git config user.name "Job Hunt Bot"
          git config user.email "bot@users.noreply.github.com"
          git add output/seen_jobs.json || true
          git diff --staged --quiet || git commit -m "chore: update seen_jobs after daily run"
          git push || echo "Push failed — will retry next run"
