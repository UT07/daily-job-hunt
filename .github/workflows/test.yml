name: Test Suite

on:
  pull_request:
  push:
    branches: [main, 'feature/*']

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Exercises the deploy-side build pipeline on every PR so deploy.yml
  # surprises (layer build perms, CFN syntax, missing CodeUri files)
  # surface BEFORE merge — not after. Added 2026-04-27 after deploy
  # 24989063876 failed at the layer-build step on a "12/12 green" PR.
  deploy-readiness:
    name: "Deploy Readiness"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AWS_DEFAULT_REGION: eu-west-1
      SAM_CLI_TELEMETRY: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SAM CLI
        run: pip install aws-sam-cli
      - name: Build shared-deps layer (catches Docker permission / shared/ packaging bugs)
        run: ./layer/build.sh
      - name: SAM Validate (CFN template syntax + Ref / GetAtt resolution)
        run: sam validate --region eu-west-1
      - name: SAM Build (catches missing CodeUri files, broken Dockerfile, wrong Handlers)
        env:
          DOCKER_BUILDKIT: "0"
        run: sam build
      # Runtime-import smoke — catches the PR #12 / 2026-04-29 class of bug where
      # `sam build` succeeds but a module the container Lambda imports lazily
      # (e.g. `from lambdas.pipeline.ai_helper import ...`) is missing from the
      # image. `sam build` validates the image builds; this step actually loads
      # app.py inside the built image to exercise import resolution.
      # Uses no untrusted GitHub event inputs.
      - name: Runtime import smoke (API container)
        run: |
          set -eo pipefail
          IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'jobhuntapi|JobHuntApi' | head -1)
          if [ -z "$IMAGE" ]; then
            echo "::warning::No API container image found from sam build; skipping import smoke"
            exit 0
          fi
          echo "Smoke-testing import resolution inside $IMAGE"
          # Real Lambda runtime sets AWS_DEFAULT_REGION automatically; bare
          # `docker run` does not. ai_helper.py creates boto3 SSM client at
          # module-load time, which explodes with NoRegionError without it.
          # Env vars below mimic the deployed Lambda env minimally.
          docker run --rm \
            -e AWS_DEFAULT_REGION=eu-west-1 \
            -e SUPABASE_URL=http://localhost \
            -e SUPABASE_SERVICE_KEY=fake \
            --entrypoint /var/lang/bin/python "$IMAGE" -c '
          # Lifespan-execution smoke. The 2026-04-30 incident (PR #42 hotfix)
          # showed that "import app" alone is insufficient — `_initialize_state`
          # runs LAZY imports during FastAPI lifespan startup that bare module
          # imports never trigger. `config/`, and future top-level packages,
          # only get exercised by actually running the lifespan.
          import asyncio
          import app as app_module
          # Eager-import guard: catches module-load-time regressions in shared/
          # and lambdas/ that the lifespan path does NOT exercise.
          from shared.load_job import load_job
          from shared.profile_completeness import check_profile_completeness
          from shared.platform_metadata import fetch_metadata
          from shared.platform_metadata.greenhouse import GreenhouseFetchError
          from shared.platform_metadata.ashby import AshbyFetchError
          from shared.cover_letter_loader import load_cover_letter
          from shared.answer_generator import generate_answer
          from shared.preview_cache import get_preview_cache, set_preview_cache
          from shared.apply_models import ApplyPreviewResponse
          from lambdas.pipeline.ai_helper import ai_complete_cached
          # Lifespan-startup probe: exercises lazy imports inside
          # _initialize_state (e.g. `from config.feature_flags import set_client`)
          # so missing Dockerfile.lambda COPY directives fail CI, not prod.
          async def _run_lifespan():
              async with app_module.app.router.lifespan_context(app_module.app):
                  pass
          asyncio.run(_run_lifespan())
          print("All apply_preview imports + lifespan startup resolved")
          '

  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check lambdas/ tests/ app.py
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm ci
      - working-directory: web
        run: npm run build

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/unit/ tests/contract/ -v --tb=short -x
        env:
          AWS_DEFAULT_REGION: eu-west-1

  security-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/security/ -v --tb=short
        env:
          AWS_DEFAULT_REGION: eu-west-1
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/integration/ -v --tb=short -m integration || true
        env:
          AWS_DEFAULT_REGION: eu-west-1
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # === Quality Pipeline: MUST PASS jobs ===
  data-quality-tests:
    name: "Tier 4b: Data Quality"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/quality/test_data_quality.py -v --tb=short
        env:
          AWS_DEFAULT_REGION: eu-west-1

  writing-quality-tests:
    name: "Tier 4c: Writing Quality (structural)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/quality/test_writing_quality.py -v --tb=short
        env:
          AWS_DEFAULT_REGION: eu-west-1

  self-improvement-tests:
    name: "Tier 4d: Self-Improvement"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/quality/test_self_improvement.py -v --tb=short
        env:
          AWS_DEFAULT_REGION: eu-west-1

  # === Quality Pipeline: REPORT ONLY jobs (don't block PRs) ===
  score-determinism:
    name: "Score Determinism (REPORT)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/quality/test_score_determinism.py -v --tb=short || true

  ai-quality-golden:
    name: "AI Quality Golden Dataset (REPORT)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/quality/test_scoring_quality.py -v --tb=short || true

  conflict-detection:
    name: "Conflict Detection (REPORT)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/quality/test_self_improvement.py::TestConflictDetection -v --tb=short || true

  # Smart Apply Phase 1 quality gates (per spec §6.3 Layers A + B).
  # REPORT-only: both layers skip on PRs without staging secrets, and the
  # job is `continue-on-error` so prompt iteration never blocks merges.
  # Hard floors run nightly with FLOOR_TEST_* + FLOOR_TEST_TOKEN secrets.
  apply-answer-quality:
    name: "Apply Answer Quality (REPORT)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pip install scikit-learn
      - name: Run apply-answer Layer A + Layer B (skips when secrets unset)
        env:
          AWS_DEFAULT_REGION: eu-west-1
          FLOOR_TEST_JOB_IDS: ${{ secrets.FLOOR_TEST_JOB_IDS }}
          FLOOR_TEST_TOKEN: ${{ secrets.FLOOR_TEST_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          pytest tests/quality/test_answer_quality_floor.py \
                 tests/quality/test_answer_quality_golden.py \
                 -v --tb=short || true

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --config=tests/e2e/playwright.config.ts || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
