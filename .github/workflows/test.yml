name: Test Suite

on:
  pull_request:
  push:
    branches: [main, 'feature/*']

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check lambdas/ tests/ app.py
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm ci
      - working-directory: web
        run: npm run build

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r tests/requirements-test.txt
      - run: pytest tests/unit/ tests/contract/ -v --tb=short -x
        env:
          AWS_DEFAULT_REGION: eu-west-1

  security-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r tests/requirements-test.txt
      - run: pytest tests/security/ -v --tb=short -m security
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r tests/requirements-test.txt
      - run: pytest tests/integration/ -v --tb=short -m integration || true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # === Quality Pipeline: MUST PASS jobs ===
  data-quality-tests:
    name: "Tier 4b: Data Quality"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/quality/test_data_quality.py -v --tb=short

  writing-quality-tests:
    name: "Tier 4c: Writing Quality (structural)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/quality/test_writing_quality.py -v --tb=short

  self-improvement-tests:
    name: "Tier 4d: Self-Improvement"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/quality/test_self_improvement.py -v --tb=short

  # === Quality Pipeline: REPORT ONLY jobs (don't block PRs) ===
  score-determinism:
    name: "Score Determinism (REPORT)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/quality/test_score_determinism.py -v --tb=short || true

  ai-quality-golden:
    name: "AI Quality Golden Dataset (REPORT)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/quality/test_scoring_quality.py -v --tb=short || true

  conflict-detection:
    name: "Conflict Detection (REPORT)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/quality/test_self_improvement.py::TestConflictDetection -v --tb=short || true

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --config=tests/e2e/playwright.config.ts || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
