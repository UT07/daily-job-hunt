AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Job Hunt API — FastAPI on Lambda (container image with tectonic)

Globals:
  Function:
    Timeout: 900
    MemorySize: 1024

Parameters:
  GroqApiKey:
    Type: String
    NoEcho: true
  OpenRouterApiKey:
    Type: String
    NoEcho: true
  QwenApiKey:
    Type: String
    NoEcho: true
    Default: ""
  NvidiaApiKey:
    Type: String
    NoEcho: true
    Default: ""
  GoogleCredentialsJson:
    Type: String
    NoEcho: true
  SupabaseUrl:
    Type: String
  SupabaseServiceKey:
    Type: String
    NoEcho: true
  SupabaseJwtSecret:
    Type: String
    NoEcho: true
  SerperApiKey:
    Type: String
    NoEcho: true
    Default: ""
  ApifyApiKey:
    Type: String
    NoEcho: true
    Default: ""

Resources:

  # --- SQS Task Queue ---
  TaskQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 5400
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TaskDLQ.Arn
        maxReceiveCount: 3

  # --- SQS Dead Letter Queue ---
  TaskDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  # --- Lambda Layer (Shared Python Dependencies) ---
  SharedDepsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: naukribaba-shared-deps
      ContentUri: layer/
      CompatibleRuntimes:
        - python3.11
    Metadata:
      BuildMethod: python3.11

  # --- Scraper Lambda Functions ---
  ScrapeApifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-scrape-apify
      Handler: lambdas/scrapers/scrape_apify.handler
      Runtime: python3.11
      Timeout: 300
      MemorySize: 256
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*

  ScrapeAdzunaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-scrape-adzuna
      Handler: lambdas/scrapers/scrape_adzuna.handler
      Runtime: python3.11
      Timeout: 30
      MemorySize: 128
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*

  ScrapeHNFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-scrape-hn
      Handler: lambdas/scrapers/scrape_hn.handler
      Runtime: python3.11
      Timeout: 60
      MemorySize: 128
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*

  ScrapeYCFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-scrape-yc
      Handler: lambdas/scrapers/scrape_yc.handler
      Runtime: python3.11
      Timeout: 30
      MemorySize: 128
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*

  # --- Pipeline Lambda Functions ---
  LoadConfigFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-load-config
      Handler: lambdas/pipeline/load_config.handler
      Runtime: python3.11
      Timeout: 30
      MemorySize: 128
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*

  MergeDedupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-merge-dedup
      Handler: lambdas/pipeline/merge_dedup.handler
      Runtime: python3.11
      Timeout: 30
      MemorySize: 128
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*

  ScoreBatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-score-batch
      Handler: lambdas/pipeline/score_batch.handler
      Runtime: python3.11
      Timeout: 300
      MemorySize: 512
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*

  TailorResumeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-tailor-resume
      Handler: lambdas/pipeline/tailor_resume.handler
      Runtime: python3.11
      Timeout: 120
      MemorySize: 256
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*
        - S3CrudPolicy:
            BucketName: utkarsh-job-hunt

  CompileLatexFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-compile-latex
      Handler: lambdas/pipeline/compile_latex.handler
      Runtime: python3.11
      Timeout: 60
      MemorySize: 512
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - S3CrudPolicy:
            BucketName: utkarsh-job-hunt

  GenerateCoverLetterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-generate-cover-letter
      Handler: lambdas/pipeline/generate_cover_letter.handler
      Runtime: python3.11
      Timeout: 120
      MemorySize: 256
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*
        - S3CrudPolicy:
            BucketName: utkarsh-job-hunt

  FindContactsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-find-contacts
      Handler: lambdas/pipeline/find_contacts.handler
      Runtime: python3.11
      Timeout: 120
      MemorySize: 128
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*

  SaveJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-save-job
      Handler: lambdas/pipeline/save_job.handler
      Runtime: python3.11
      Timeout: 30
      MemorySize: 128
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*
        - S3CrudPolicy:
            BucketName: utkarsh-job-hunt

  SaveMetricsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-save-metrics
      Handler: lambdas/pipeline/save_metrics.handler
      Runtime: python3.11
      Timeout: 30
      MemorySize: 128
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*

  SendEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-send-email
      Handler: lambdas/pipeline/send_email.handler
      Runtime: python3.11
      Timeout: 30
      MemorySize: 128
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*

  SelfImproveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-self-improve
      Handler: lambdas/pipeline/self_improve.handler
      Runtime: python3.11
      Timeout: 120
      MemorySize: 256
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*
        - LambdaInvokePolicy:
            FunctionName: naukribaba-notify-error

  NotifyErrorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-notify-error
      Handler: lambdas/pipeline/notify_error.handler
      Runtime: python3.11
      Timeout: 30
      MemorySize: 128
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*

  CheckExpiryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naukribaba-check-expiry
      Handler: lambdas/pipeline/check_expiry.handler
      Runtime: python3.11
      Timeout: 120
      MemorySize: 128
      Layers: [!Ref SharedDepsLayer]
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: /naukribaba/*

  # --- Lambda Function (Docker container with tectonic) ---
  JobHuntApi:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Description: Job Hunt FastAPI backend with LaTeX (tectonic) support
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt TaskQueue.QueueName
        - SQSPollerPolicy:
            QueueName: !GetAtt TaskQueue.QueueName
        - S3CrudPolicy:
            BucketName: utkarsh-job-hunt
      Environment:
        Variables:
          GROQ_API_KEY: !Ref GroqApiKey
          OPENROUTER_API_KEY: !Ref OpenRouterApiKey
          QWEN_API_KEY: !Ref QwenApiKey
          NVIDIA_API_KEY: !Ref NvidiaApiKey
          GOOGLE_CREDENTIALS_JSON: !Ref GoogleCredentialsJson
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_KEY: !Ref SupabaseServiceKey
          SUPABASE_JWT_SECRET: !Ref SupabaseJwtSecret
          SERPER_API_KEY: !Ref SerperApiKey
          APIFY_API_KEY: !Ref ApifyApiKey
          TASK_QUEUE_URL: !Ref TaskQueue
      Events:
        ApiGateway:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        TaskWorker:
          Type: SQS
          Properties:
            Queue: !GetAtt TaskQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures
    Metadata:
      DockerTag: latest
      DockerContext: .
      Dockerfile: Dockerfile.lambda

  # --- HTTP API Gateway ---
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "https://naukribaba.netlify.app"
          - "http://localhost:5173"
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - "*"
        AllowCredentials: true

  # --- S3 Bucket for Frontend ---
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-frontend"
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicRead
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  FrontendUrl:
    Description: Frontend S3 website URL
    Value: !GetAtt FrontendBucket.WebsiteURL
  TaskQueueUrl:
    Description: SQS Task Queue URL
    Value: !Ref TaskQueue
  TaskDLQUrl:
    Description: SQS Dead Letter Queue URL
    Value: !Ref TaskDLQ
