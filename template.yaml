AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Job Hunt API — FastAPI on Lambda (container image with tectonic)

Globals:
  Function:
    Timeout: 300
    MemorySize: 1024

Parameters:
  GroqApiKey:
    Type: String
    NoEcho: true
  OpenRouterApiKey:
    Type: String
    NoEcho: true
  QwenApiKey:
    Type: String
    NoEcho: true
    Default: ""
  NvidiaApiKey:
    Type: String
    NoEcho: true
    Default: ""
  GoogleCredentialsJson:
    Type: String
    NoEcho: true
  SupabaseUrl:
    Type: String
  SupabaseServiceKey:
    Type: String
    NoEcho: true
  SupabaseJwtSecret:
    Type: String
    NoEcho: true
  SerperApiKey:
    Type: String
    NoEcho: true
    Default: ""
  ApifyApiKey:
    Type: String
    NoEcho: true
    Default: ""

Resources:

  # --- Lambda Function (Docker container with tectonic) ---
  JobHuntApi:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Description: Job Hunt FastAPI backend with LaTeX (tectonic) support
      Environment:
        Variables:
          GROQ_API_KEY: !Ref GroqApiKey
          OPENROUTER_API_KEY: !Ref OpenRouterApiKey
          QWEN_API_KEY: !Ref QwenApiKey
          NVIDIA_API_KEY: !Ref NvidiaApiKey
          GOOGLE_CREDENTIALS_JSON: !Ref GoogleCredentialsJson
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_KEY: !Ref SupabaseServiceKey
          SUPABASE_JWT_SECRET: !Ref SupabaseJwtSecret
          SERPER_API_KEY: !Ref SerperApiKey
          APIFY_API_KEY: !Ref ApifyApiKey
      Events:
        ApiGateway:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
    Metadata:
      DockerTag: latest
      DockerContext: .
      Dockerfile: Dockerfile.lambda

  # --- HTTP API Gateway ---
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - "*"
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - "*"

  # --- S3 Bucket for Frontend ---
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-frontend"
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicRead
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  FrontendUrl:
    Description: Frontend S3 website URL
    Value: !GetAtt FrontendBucket.WebsiteURL
